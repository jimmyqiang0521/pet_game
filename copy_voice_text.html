<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音话术复制工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .instructions {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .instructions h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .instructions ol {
            margin-left: 20px;
            color: #333;
            line-height: 1.8;
        }

        .instructions a {
            color: #1976d2;
            font-weight: bold;
        }

        .voice-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .voice-card h2 {
            font-size: 16px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .voice-card .text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: white;
            color: #f5576c;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .success-msg {
            display: none;
            background: #4caf50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        .settings {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .settings h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 语音话术复制工具</h1>

        <div class="instructions">
            <h3>📝 使用说明</h3>
            <ol>
                <li>访问 <a href="https://azure.microsoft.com/zh-cn/products/ai-services/text-to-speech" target="_blank">微软在线TTS</a></li>
                <li>在左侧选择"晓晓"语音</li>
                <li>点击下方按钮复制话术</li>
                <li>粘贴到TTS工具中试听/下载</li>
            </ol>
        </div>

        <div class="voice-card">
            <h2>📋 话术内容（点击复制）</h2>
            <div class="text" id="textToCopy">小朋友，我们一起学画画吧，真开心！</div>
            <button class="copy-btn" onclick="copyText()">📋 复制话术</button>
            <div class="success-msg" id="successMsg">✅ 已复制到剪贴板！</div>
        </div>

        <div class="settings">
            <h3>⚙️ 推荐设置参数</h3>
            <div class="settings-item">
                <span>语音：</span>
                <span>zh-CN-XiaoxiaoNeural（晓晓）</span>
            </div>
            <div class="settings-item">
                <span>语速：</span>
                <span>+2（活泼可爱）</span>
            </div>
            <div class="settings-item">
                <span>音调：</span>
                <span>默认或 +2</span>
            </div>
        </div>
    </div>

    <script>
        function copyText() {
            const text = document.getElementById('textToCopy').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
