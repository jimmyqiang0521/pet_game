            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16) + '.mp3';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制：' + text);
            });
        }

        const container = document.getElementById('voice-list');
        
        for (const [petType, categories] of Object.entries(MESSAGES)) {
            const petTitle = document.createElement('h2');
            petTitle.className = 'section-title';
            petTitle.textContent = {cat: '🐱 小猫咪', dog: '🐕 小狗狗', rabbit: '🐰 小兔子'}[petType];
            container.appendChild(petTitle);
            
            for (const [category, messages] of Object.entries(categories)) {
                const categoryTitle = document.createElement('h3');
                categoryTitle.textContent = {
                    feed: '🍖 喂食', play: '🎾 玩耍', clean: '🛁 洗澡', sleep: '💤 睡觉',
                    hungry: '😋 饿了', tired: '😴 累了', dirty: '🧼 脏了',
                    sad: '😢 难过', happy: '😊 开心', welcome: '👋 欢迎', login: '🏠 回家'
                }[category];
                container.appendChild(categoryTitle);
                
                messages.forEach(text => {
                    const filename = getFilename(text);
                    const item = document.createElement('div');
                    item.className = 'voice-item';
                    item.innerHTML = `
                        <div>
                            <span class="filename">${filename}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${text.replace(/'/g, "\\'")}')">复制话术</button>

                    `;
