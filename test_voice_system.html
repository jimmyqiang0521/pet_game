<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音系统测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>语音系统测试</h1>
    
    <div class="test-section">
        <h2>测试本地音频播放</h2>
        <button onclick="testVoice('谢谢主人～好好吃哦！')">测试喂食语音</button>
        <button onclick="testVoice('好开心好开心～喵喵！')">测试玩耍语音</button>
        <button onclick="testVoice('洗香香啦～好舒服哦！')">测试洗澡语音</button>
        <button onclick="testVoice('晚安主人～我要睡觉觉啦！')">测试睡觉语音</button>
    </div>
    
    <div class="test-section">
        <h2>测试MD5映射</h2>
        <button onclick="testMD5('谢谢主人～好好吃哦！')">测试MD5生成</button>
        <button onclick="listAllMessages()">列出所有消息</button>
    </div>
    
    <div class="test-section">
        <h2>测试系统状态</h2>
        <button onclick="testSystemStatus()">检查系统状态</button>
    </div>
    
    <div class="log" id="log"></div>
    
    <script src="js/storage.js"></script>
    <script src="js/voice.js"></script>
    <script>
        // 初始化语音系统
        Voice.init();
        
        function log(message) {
            const logElement = document.getElementById('log');
            logElement.textContent += new Date().toLocaleTimeString() + ': ' + message + '\n';
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function testVoice(text) {
            log('测试语音: ' + text);
            log('文件名: ' + Voice.getFilename(text));
            log('音频路径: audio/' + Voice.getFilename(text));
            Voice.speak(text).then(() => {
                log('语音播放完成');
            });
        }
        
        function testMD5(text) {
            const md5Hash = Voice.getFilename(text);
            log('文本: ' + text);
            log('MD5: ' + md5Hash);
        }
        
        function listAllMessages() {
            log('=== 所有语音消息 ===');
            
            for (const petType in Voice.messages) {
                log('\n宠物类型: ' + petType);
                for (const category in Voice.messages[petType]) {
                    log('  类别: ' + category);
                    Voice.messages[petType][category].forEach((message, index) => {
                        const filename = Voice.getFilename(message);
                        log('    ' + (index + 1) + '. ' + message + ' -> ' + filename);
                    });
                }
            }
        }
        
        function testSystemStatus() {
            log('=== 系统状态 ===');
            log('语音启用: ' + Voice.isEnabled());
            log('正在说话: ' + Voice.isSpeaking());
            log('使用本地音频: ' + Voice.useLocalAudio);
            log('首次交互: ' + Voice.isFirstInteraction);
        }
        
        // 页面加载完成后测试
        window.onload = function() {
            log('语音系统测试页面已加载');
            log('Voice对象是否存在: ' + (typeof Voice !== 'undefined'));
            if (Voice) {
                log('语音系统初始化: ' + Voice.init());
            }
        };
    </script>
</body>
</html>
